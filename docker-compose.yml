version: "3.9"

services:
  # ── FastAPI Backend ───────────────────────────────────────────
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      # Override localhost URLs with Docker service names for container networking
      - REDIS_URL=redis://redis:6379
      - QDRANT_URL=http://qdrant:6333
    depends_on:
      - redis
      - qdrant
    restart: unless-stopped
    volumes:
      - ./backend:/app

  # ── Next.js Frontend ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    env_file: .env
    depends_on:
      - backend
    restart: unless-stopped

  # ── Redis (cache + session) ───────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    command: redis-server --appendonly yes

  # ── Qdrant (vector database) ──────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.12.0
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

volumes:
  redis_data:
  qdrant_data:
